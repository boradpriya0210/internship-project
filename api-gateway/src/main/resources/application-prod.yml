server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  # Fully exclude Eureka auto-configuration to prevent slow startup
  # This avoids the 90+ second delay caused by Eureka connection attempts
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.reactive.EurekaReactiveDiscoveryClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.config.EurekaDiscoveryClientConfigServiceBootstrapConfiguration
  
  cloud:
    gateway:
      # Disable discovery locator - we use direct URLs
      discovery:
        locator:
          enabled: false
      
      # Routes using DIRECT Render URLs (no Eureka/lb:// needed)
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:https://user-service-9jg7.onrender.com}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /$\{segment}
        
        - id: skill-assessment-service
          uri: ${SKILL_ASSESSMENT_SERVICE_URL:https://skill-assessment-service.onrender.com}
          predicates:
            - Path=/api/assessments/**
          filters:
            - RewritePath=/api/assessments/(?<segment>.*), /$\{segment}
        
        - id: internship-service
          uri: ${INTERNSHIP_SERVICE_URL:https://internship-service-e9fs.onrender.com}
          predicates:
            - Path=/api/internships/**
          filters:
            - RewritePath=/api/internships/(?<segment>.*), /$\{segment}
        
        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:https://recommendation-service-4m8s.onrender.com}
          predicates:
            - Path=/api/recommendations/**
          filters:
            - RewritePath=/api/recommendations/(?<segment>.*), /$\{segment}
        
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:https://notification-service-wo2h.onrender.com}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /$\{segment}
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

# Fully disable Eureka client
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Actuator Health
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
  health:
    discovery:
      enabled: false

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
