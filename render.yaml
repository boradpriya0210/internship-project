          suffix: /eureka/
      - key: DATABASE_URL
        value: jdbc:mysql://YOUR_DB_HOST:3306/internship_service_db
      - key: DATABASE_USERNAME
        value: YOUR_DB_USER
      - key: DATABASE_PASSWORD
        value: YOUR_DB_PASS
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 5. Recommendation Service
  - type: web
    name: recommendation-service
    env: docker
    dockerContext: ./recommendation-service
    plan: free
    healthCheckPath: /health
    envVars:
