services:
  # 1. Eureka Server (Discovery)
  - type: web
    name: eureka-server
    env: docker
    dockerContext: ./eureka-server
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 2. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: ./user-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: EUREKA_SERVER_URL
        fromService:
          name: eureka-server
          type: web
          property: url
          suffix: /eureka/
      - key: DATABASE_URL
        value: jdbc:mysql://YOUR_DB_HOST:3306/user_service_db
      - key: DATABASE_USERNAME
        value: YOUR_DB_USER
      - key: DATABASE_PASSWORD
        value: YOUR_DB_PASS
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 3. Skill Assessment Service
  - type: web
    name: skill-assessment-service
    env: docker
    dockerContext: ./skill-assessment-service
    plan: free
    healthCheckPath: /health
