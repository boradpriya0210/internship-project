server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      # Discovery locator for Eureka
      discovery:
        locator:
          enabled: ${EUREKA_ENABLED:true}
          lower-case-service-id: true
      
      # Explicit routes with fallback support
      routes:
        # User Service
        - id: user-service
          uri: ${USER_SERVICE_URL:lb://user-service}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/user-service
        
        # Skill Assessment Service
        - id: skill-assessment-service
          uri: ${SKILL_ASSESSMENT_SERVICE_URL:lb://skill-assessment-service}
          predicates:
            - Path=/api/assessments/**
          filters:
            - RewritePath=/api/assessments/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: assessmentServiceCircuitBreaker
                fallbackUri: forward:/fallback/skill-assessment-service
        
        # Internship Service
        - id: internship-service
          uri: ${INTERNSHIP_SERVICE_URL:lb://internship-service}
          predicates:
            - Path=/api/internships/**
          filters:
            - RewritePath=/api/internships/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: internshipServiceCircuitBreaker
                fallbackUri: forward:/fallback/internship-service
        
        # Recommendation Service
        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:lb://recommendation-service}
          predicates:
            - Path=/api/recommendations/**
          filters:
            - RewritePath=/api/recommendations/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: recommendationServiceCircuitBreaker
                fallbackUri: forward:/fallback/recommendation-service
        
        # Notification Service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:lb://notification-service}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker
                fallbackUri: forward:/fallback/notification-service
      
      # Global CORS Configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:*}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

# Eureka Client Configuration with fallback
eureka:
  client:
    # Make Eureka optional for cloud deployment
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      # Use HTTPS for Render cloud deployment - CRITICAL!
      defaultZone: https://eureka-server-6n60.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: false  # API Gateway doesn't need to register
    # Resilience settings
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
  instance:
    prefer-ip-address: false    # Use hostname for Render
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}      # Render sets this automatically
    instance-id: ${spring.application.name}:${server.port}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
    health-check-url-path: /actuator/health

# Resilience4j Circuit Breaker for fallback
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      userServiceCircuitBreaker:
        baseConfig: default
      assessmentServiceCircuitBreaker:
        baseConfig: default
      internshipServiceCircuitBreaker:
        baseConfig: default
      recommendationServiceCircuitBreaker:
        baseConfig: default
      notificationServiceCircuitBreaker:
        baseConfig: default

# Actuator for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
    com.internship: DEBUG
