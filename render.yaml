          name: eureka-server
          type: web
          property: url
          suffix: /eureka/
      - key: DATABASE_URL
        value: jdbc:mysql://YOUR_DB_HOST:3306/skill_assessment_db
      - key: DATABASE_USERNAME
        value: YOUR_DB_USER
      - key: DATABASE_PASSWORD
        value: YOUR_DB_PASS
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 4. Internship Service
