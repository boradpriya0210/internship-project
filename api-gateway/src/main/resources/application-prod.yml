server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      # DISABLE discovery locator - we use direct URLs on Render, not Eureka
      discovery:
        locator:
          enabled: false
      
      # Routes using DIRECT Render URLs instead of lb:// (Eureka not needed)
      routes:
        # User Service
        - id: user-service
          uri: ${USER_SERVICE_URL:https://user-service-9jg7.onrender.com}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /$\{segment}
        
        # Skill Assessment Service
        - id: skill-assessment-service
          uri: ${SKILL_ASSESSMENT_SERVICE_URL:https://skill-assessment-service.onrender.com}
          predicates:
            - Path=/api/assessments/**
          filters:
            - RewritePath=/api/assessments/(?<segment>.*), /$\{segment}
        
        # Internship Service
        - id: internship-service
          uri: ${INTERNSHIP_SERVICE_URL:https://internship-service-e9fs.onrender.com}
          predicates:
            - Path=/api/internships/**
          filters:
            - RewritePath=/api/internships/(?<segment>.*), /$\{segment}
        
        # Recommendation Service
        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:https://recommendation-service-4m8s.onrender.com}
          predicates:
            - Path=/api/recommendations/**
          filters:
            - RewritePath=/api/recommendations/(?<segment>.*), /$\{segment}
        
        # Notification Service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:https://notification-service-wo2h.onrender.com}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /$\{segment}
      
      # Global CORS Configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

# DISABLE Eureka completely for Render deployment
# Render free tier services sleep, so Eureka is unreliable
# We use direct URLs in the routes above instead
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Actuator for Health Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
  health:
    discovery:
      enabled: false  # Don't let Eureka affect health status

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
    com.internship: DEBUG
