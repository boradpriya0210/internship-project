services:
  # 1. Eureka Server (Discovery)
  - type: web
    name: eureka-server
    env: docker
    dockerContext: ./eureka-server
    dockerfilePath: ./eureka-server/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8761"
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m -Xss512k -XX:+UseG1GC"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EUREKA_HOSTNAME
        value: eureka-server-6n60.onrender.com  # Replace with your actual Render domain
      - key: EUREKA_IP_ADDRESS
        value: ""  # Will auto-detect IP
      - key: SERVER_SERVLET_CONTEXT_PATH
        value: /

  # 2. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: ./user-service
    dockerfilePath: ./user-service/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8081"
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m -Xss512k -XX:+UseG1GC"
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_SERVER_URL
        value: https://eureka-server-6n60.onrender.com/eureka/  # Replace with your Eureka URL
      - key: DATABASE_URL
        value: jdbc:mysql://mysql-1de121cc-priyaborad56-f021.i.aivencloud.com:21279/user_service_db
      - key: DATABASE_USERNAME
        value: avnadmin
      - key: DATABASE_PASSWORD
        value: AVNS_78919TKx8ma86mzMIFd
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_POOL_SIZE
        value: "10"

