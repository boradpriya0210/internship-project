version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: internship-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialize multiple databases
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DATABASE_URL=jdbc:mysql://mysql:3306/user_service_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Skill Assessment Service
  skill-assessment-service:
    build: ./skill-assessment-service
    container_name: skill-assessment-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DATABASE_URL=jdbc:mysql://mysql:3306/skill_assessment_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Internship Service
  internship-service:
    build: ./internship-service
    container_name: internship-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DATABASE_URL=jdbc:mysql://mysql:3306/internship_service_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Recommendation Service
  recommendation-service:
    build: ./recommendation-service
    container_name: recommendation-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started

  # Notification Service
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DATABASE_URL=jdbc:mysql://mysql:3306/notification_service_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started

volumes:
  db_data:
