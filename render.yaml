services:
  # 1. Eureka Server (Discovery)
  - type: web
    name: eureka-server
    env: docker
    dockerContext: ./eureka-server
    dockerfilePath: ./eureka-server/Dockerfile
    plan: free
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx256m -Xss512k"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 2. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: ./user-service
    dockerfilePath: ./user-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx256m -Xss512k"
      - key: EUREKA_HOSTPORT
        fromService:
          name: eureka-server
          type: web
          property: hostport
      - key: EUREKA_SERVER_URL
        value: http://${EUREKA_HOSTPORT}/eureka/
      - key: DATABASE_URL
        value: jdbc:mysql://mysql-1de121cc-priyaborad56-f021.i.aivencloud.com:21279/user_service_db
      - key: DATABASE_USERNAME
        value: avnadmin
      - key: DATABASE_PASSWORD
        value: AVNS_78919TKx8ma86mzMIFd
      - key: SPRING_PROFILES_ACTIVE
        value: prod

